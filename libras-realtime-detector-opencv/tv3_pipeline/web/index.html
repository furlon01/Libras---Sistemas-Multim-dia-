<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Libras 3.0 — Simulação de Transmissão</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dashjs/4.7.4/dash.all.min.js"></script>
<style>
  :root{
    --bg: #10171A;
    --hairline: #2B3A40;
    --text: #E7EEF0;
    --signal: #F2B134;
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0; height:100%;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, sans-serif;
    display:flex; align-items:center; justify-content:center;
  }

  .stage{
    position:relative;
    background:#000;
    border-radius: 14px;
    overflow:hidden;
    border: 1px solid var(--hairline);
    width: min(980px, 96vw);
    aspect-ratio: 16/9;
  }
  .stage video{ width:100%; height:100%; object-fit:contain; background:#000; }
  .stage video::cue{
    font-family: system-ui, sans-serif;
    font-size: 1.1em;
    background: rgba(10,14,16,.75);
    color: var(--text);
    padding: .15em .4em;
  }

  .unmute-overlay{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    background: rgba(10,14,16,.55);
    cursor:pointer;
    z-index: 5;
    transition: opacity .2s ease;
  }
  .unmute-overlay.hidden{
    opacity:0; pointer-events:none;
  }
  .unmute-btn{
    display:flex; align-items:center; gap:10px;
    background: #182226; border:1px solid var(--signal);
    color: var(--text); padding: 12px 20px; border-radius: 999px;
    font-family: system-ui, sans-serif; font-size:14px; font-weight:500;
  }
  .unmute-btn .dot{
    width:9px; height:9px; border-radius:50%;
    background: var(--signal);
    box-shadow: 0 0 8px 1px rgba(242,177,52,.55);
  }
</style>
</head>
<body>

<div class="stage">
  <video id="player" playsinline muted autoplay>
    <track id="captionTrack" kind="subtitles" srclang="pt-BR" label="Português" src="legendas.vtt" default>
  </video>
  <!--
    A audiodescrição é servida como um arquivo único (não segmentado) e
    tocada aqui como um <audio> comum, sincronizado por currentTime com
    o vídeo -- evita o atraso de trocar de faixa dentro do DASH.
  -->
  <audio id="audiodesc" src="audiodescricao.m4a" preload="auto"></audio>
  <div id="unmuteOverlay" class="unmute-overlay">
    <div class="unmute-btn"><span class="dot"></span> Clique para ativar o áudio</div>
  </div>
</div>

<script>
  const video = document.getElementById('player');
  const audiodesc = document.getElementById('audiodesc');
  const unmuteOverlay = document.getElementById('unmuteOverlay');

  // legenda e audiodescrição ficam sempre ativas (sem botões de controle)
  const player = dashjs.MediaPlayer().create();
  player.initialize(video, 'stream.mpd', true);

  video.addEventListener('loadedmetadata', () => {
    const playPromise = video.play();
    if (playPromise !== undefined) {
      playPromise.catch(() => {
        // autoplay bloqueado: overlay continua visível até o clique
      });
    }
  });

  function enableAudio() {
    video.muted = false;
    video.play().catch(() => {});
    audiodesc.currentTime = video.currentTime;
    audiodesc.play().catch(() => {});
    unmuteOverlay.classList.add('hidden');
  }
  unmuteOverlay.addEventListener('click', enableAudio);

  // sincronismo do <audio> de audiodescrição com o vídeo
  video.addEventListener('play', () => {
    audiodesc.currentTime = video.currentTime;
    audiodesc.play().catch(() => {});
  });
  video.addEventListener('pause', () => audiodesc.pause());
  video.addEventListener('seeking', () => {
    audiodesc.currentTime = video.currentTime;
  });
  video.addEventListener('timeupdate', () => {
    if (Math.abs(audiodesc.currentTime - video.currentTime) > 0.3) {
      audiodesc.currentTime = video.currentTime;
    }
  });
</script>

</body>
</html>
